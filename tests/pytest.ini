[pytest]
# -x - stop at first error
# -p no:cacheprovider - don't create `.cache` folder
addopts = -x -p no:cacheprovider
#log_cli = True
#log_cli_format = %(asctime)s %(levelname)s %(message)s
#log_cli_level = DEBUG
markers =
    integration: marks tests that require a live InfluxDB 3 Core instance (deselect with -m "not integration")
